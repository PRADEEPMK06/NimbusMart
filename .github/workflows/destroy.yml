# .github/workflows/destroy.yml
# ─────────────────────────────────────────────────────────────────────────────
# Destroys a full environment (test/dev or prod).
#
# Why we uninstall the ecommerce Helm chart first:
#   The ALB Ingress creates a real AWS Load Balancer outside Terraform state.
#   If we run terraform destroy without removing it first, the VPC destroy
#   will hang because the ALB is still attached to the subnets.
#   Everything else (EKS, pods, Helm releases) is deleted by terraform destroy.
#
# Required GitHub Secrets:
#   AWS_ROLE_ARN        — test (dev) IAM role
#   AWS_ROLE_ARN_PROD   — prod IAM role
#   AWS_REGION          — e.g. us-west-2
# ─────────────────────────────────────────────────────────────────────────────

name: Destroy_Environment

on:
  workflow_dispatch:
      inputs:
        environment:
          description: "Environment to destroy"
          required: true
          type: choice
          options:
            - main
        confirm:
          description: "Type 'destroy-main' to confirm"
          required: true

permissions:
  id-token: write
  contents: read

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    steps:
      - name: Check confirmation string
        run: |
          EXPECTED="destroy-${{ github.event.inputs.environment }}"
          ACTUAL="${{ github.event.inputs.confirm }}"
          if [ "$ACTUAL" != "$EXPECTED" ]; then
            echo "❌ Confirmation mismatch."
            echo "   Expected : $EXPECTED"
            echo "   Got      : $ACTUAL"
            exit 1
          fi
          echo "✅ Confirmation validated."

  destroy:
    name: Destroy — ${{ github.event.inputs.environment }}
    runs-on: ubuntu-latest
    needs: validate

    env:
      ENV_INPUT:  ${{ github.event.inputs.environment }}
      AWS_REGION: ${{ secrets.AWS_REGION }}
      TF_VERSION: "1.7.5"
      TF_DIR: main
      CLUSTER_NAME: ecommerce-main
      ROLE_ARN: ${{ secrets.AWS_ROLE_ARN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Environment variables are set directly in the job env section

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: destroy-main-session

      - name: Setup kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: latest

      - name: Setup Helm
        uses: azure/setup-helm@v3
        with:
          version: latest

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig \
            --name ${{ env.CLUSTER_NAME }} \
            --region ${{ env.AWS_REGION }}
        continue-on-error: true

      # ── Uninstall ecommerce chart to delete the ALB before VPC destroy ───────
      - name: Uninstall ecommerce Helm chart
        run: |
          if helm status ecommerce -n ecommerce 2>/dev/null; then
            helm uninstall ecommerce -n ecommerce --wait --timeout 5m
            echo "✅ ecommerce chart uninstalled — ALB deletion triggered."
          else
            echo "ℹ_ ecommerce chart not found — skipping."
          fi
        continue-on-error: true

      - name: Wait for ALB deletion
        run: |
          echo "Waiting 60s for AWS to fully delete the ALB and target groups..."
          sleep 60

      # ── Terraform destroy ────────────────────────────────────────────────────
      - name: Terraform Init
        working-directory: terraform/environments/main
        run: terraform init

      - name: Terraform Destroy
        working-directory: terraform/environments/main
        run: |
          terraform destroy \
            -var-file="terraform.tfvars" \
            -auto-approve
          echo "✅ Terraform destroy complete for main environment."

      - name: Destroy summary
        run: |
          echo "════════════════════════════════════════"
          echo "✅ Environment '${{ env.ENV_INPUT }}' destroyed."
          echo "   Terraform state updated in S3."
          echo "════════════════════════════════════════"