name: Bootstrap_Script

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: "Type 'bootstrap' to confirm"
        required: true

permissions:
  id-token: write
  contents: read

jobs:
  bootstrap:
    name: Create S3 + DynamoDB
    runs-on: ubuntu-latest
    if: github.event.inputs.confirm == 'bootstrap'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Debug GitHub context
      - name: Debug GitHub context
        run: |
          echo "=================================="
          echo "Repository = ${{ github.repository }}"
          echo "Ref        = ${{ github.ref }}"
          echo "Event      = ${{ github.event_name }}"
          echo "Actor      = ${{ github.actor }}"
          echo "Role ARN   = ${{ secrets.AWS_ROLE_ARN }}"
          echo "Region     = ${{ secrets.AWS_REGION }}"
          echo "=================================="

      # Authenticate to AWS via OIDC
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}
          role-session-name: bootstrap-session

      # Create S3 bucket for Terraform state
      - name: Create S3 state bucket
        run: |
          BUCKET="${{ secrets.TF_STATE_BUCKET }}"
          REGION="${{ secrets.AWS_REGION }}"

          if aws s3api head-bucket --bucket "$BUCKET" 2>/dev/null; then
            echo "Bucket already exists."
          else
            echo "Creating bucket: $BUCKET in $REGION"

            if [ "$REGION" = "us-east-1" ]; then
              aws s3api create-bucket \
                --bucket "$BUCKET" \
                --region "$REGION"
            else
              aws s3api create-bucket \
                --bucket "$BUCKET" \
                --region "$REGION" \
                --create-bucket-configuration LocationConstraint="$REGION"
            fi
          fi

          aws s3api put-bucket-versioning \
            --bucket "$BUCKET" \
            --versioning-configuration Status=Enabled

          aws s3api put-bucket-encryption \
            --bucket "$BUCKET" \
            --server-side-encryption-configuration '{
              "Rules": [{
                "ApplyServerSideEncryptionByDefault": {
                  "SSEAlgorithm": "AES256"
                }
              }]
            }'

          aws s3api put-public-access-block \
            --bucket "$BUCKET" \
            --public-access-block-configuration \
            "BlockPublicAcls=true,IgnorePublicAcls=true,BlockPublicPolicy=true,RestrictPublicBuckets=true"

      # Create DynamoDB table
      - name: Create DynamoDB lock table
        run: |
          TABLE="${{ secrets.TF_STATE_LOCK_TABLE }}"
          REGION="${{ secrets.AWS_REGION }}"

          if aws dynamodb describe-table \
            --table-name "$TABLE" \
            --region "$REGION" >/dev/null 2>&1; then
            echo "Table already exists."
          else
            aws dynamodb create-table \
              --table-name "$TABLE" \
              --attribute-definitions AttributeName=LockID,AttributeType=S \
              --key-schema AttributeName=LockID,KeyType=HASH \
              --billing-mode PAY_PER_REQUEST \
              --region "$REGION"
          fi

      - name: Bootstrap complete
        run: |
          echo "═══════════════════════════════════════"
          echo "Remote state infrastructure is ready."
          echo "Bucket : ${{ secrets.TF_STATE_BUCKET }}"
          echo "Table  : ${{ secrets.TF_STATE_LOCK_TABLE }}"
          echo "Region : ${{ secrets.AWS_REGION }}"
          echo "═══════════════════════════════════════"