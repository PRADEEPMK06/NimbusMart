# .github/workflows/deploy-test.yml
# ─────────────────────────────────────────────────────────────────────────────
# Test Deployment pipeline.
# Trigger:
#   - Push/Merge to 'test' branch
#   - Manual trigger (workflow_dispatch)
#
# Behavior:
#   1. Applies Terraform changes to the Dev environment (acting as our Test environment).
#   2. Builds and pushes backend/frontend containers to Amazon ECR.
#   3. Installs infrastructure Helm charts (ALB Controller, Cluster Autoscaler, Prometheus, Fluent Bit).
#   4. Deploys the application using Helm.
#   5. Runs a smoke test/health probe to confirm successful deployment.
#
# Required Secrets:
#   AWS_ROLE_ARN        — Dev IAM role for GitHub OIDC
#   AWS_REGION          — e.g. us-west-2
#   AWS_ACCOUNT_ID      — 12-digit AWS account ID
#   GRAFANA_ADMIN_PASSWORD — Grafana admin password
# ─────────────────────────────────────────────────────────────────────────────

name: Deploy_Test_Environment

on:
  push:
    branches: [test]
    paths:
      - apps/**
      - helm/**
      - terraform/**
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION:       ${{ secrets.AWS_REGION }}
  AWS_ACCOUNT_ID:   ${{ secrets.AWS_ACCOUNT_ID }}
  CLUSTER_NAME:     ecommerce-dev
  NAMESPACE:        ecommerce
  IMAGE_TAG:        ${{ github.sha }}

jobs:
  terraform-apply:
    name: Apply Terraform
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: test-tf-apply-session

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.5"

      - name: Terraform Init
        working-directory: terraform/environments/dev
        run: terraform init

      - name: Terraform Apply
        working-directory: terraform/environments/dev
        run: terraform apply -auto-approve -var-file="terraform.tfvars"

  build-and-push:
    name: Build and Push to ECR
    runs-on: ubuntu-latest
    needs: terraform-apply
    outputs:
      frontend_image: ${{ steps.build-frontend.outputs.image }}
      backend_image:  ${{ steps.build-backend.outputs.image }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: test-ecr-push-session

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build & push frontend
        id: build-frontend
        working-directory: apps/frontend
        run: |
          IMAGE="${{ steps.login-ecr.outputs.registry }}/ecommerce-frontend:${{ env.IMAGE_TAG }}"
          docker build -t "$IMAGE" .
          docker push "$IMAGE"
          echo "image=$IMAGE" >> $GITHUB_OUTPUT

      - name: Build & push backend
        id: build-backend
        working-directory: apps/backend
        run: |
          IMAGE="${{ steps.login-ecr.outputs.registry }}/ecommerce-backend:${{ env.IMAGE_TAG }}"
          docker build -t "$IMAGE" .
          docker push "$IMAGE"
          echo "image=$IMAGE" >> $GITHUB_OUTPUT

  deploy-helm:
    name: Deploy Helm Charts
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: test-helm-deploy-session

      - uses: azure/setup-kubectl@v3
      - uses: azure/setup-helm@v3

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig \
            --name ${{ env.CLUSTER_NAME }} \
            --region ${{ env.AWS_REGION }}

      - name: Wait for EKS nodes to be ready
        run: |
          kubectl wait --for=condition=Ready nodes --all --timeout=5m

      - name: Get Terraform outputs
        working-directory: terraform/environments/dev
        run: |
          wget -q https://releases.hashicorp.com/terraform/1.7.5/terraform_1.7.5_linux_amd64.zip
          unzip -q terraform_1.7.5_linux_amd64.zip && sudo mv terraform /usr/local/bin/
          terraform init -backend=true
          echo "BACKEND_SA_ROLE_ARN=$(terraform output -raw backend_sa_role_arn)" >> $GITHUB_ENV
          echo "ALB_CONTROLLER_ROLE_ARN=$(terraform output -raw alb_controller_role_arn)" >> $GITHUB_ENV
          echo "VPC_ID=$(terraform output -raw vpc_id)" >> $GITHUB_ENV

      - name: Add Helm repos
        run: |
          helm repo add eks https://aws.github.io/eks-charts
          helm repo add autoscaler https://kubernetes.github.io/autoscaler
          helm repo add prometheus-community https://prometheus-community.github.io/helm-charts
          helm repo add grafana https://grafana.github.io/helm-charts
          helm repo add fluent https://fluent.github.io/helm-charts
          helm repo update

      - name: Install AWS Load Balancer Controller
        run: |
          helm upgrade --install aws-load-balancer-controller eks/aws-load-balancer-controller \
            --namespace kube-system \
            --create-namespace \
            -f helm/infrastructure/aws-load-balancer-controller/values.yaml \
            --set clusterName=${{ env.CLUSTER_NAME }} \
            --set region=${{ env.AWS_REGION }} \
            --set vpcId=${{ env.VPC_ID }} \
            --set serviceAccount.annotations."eks\.amazonaws\.com/role-arn"=${{ env.ALB_CONTROLLER_ROLE_ARN }} \
            --atomic --wait --timeout 10m

      - name: Install Cluster Autoscaler
        run: |
          helm upgrade --install cluster-autoscaler autoscaler/cluster-autoscaler \
            --namespace kube-system \
            -f helm/infrastructure/cluster-autoscaler/values.yaml \
            --set autoDiscovery.clusterName=${{ env.CLUSTER_NAME }} \
            --set awsRegion=${{ env.AWS_REGION }} \
            --atomic --wait --timeout 5m

      - name: Install Prometheus + Grafana
        run: |
          helm upgrade --install prometheus prometheus-community/kube-prometheus-stack \
            --namespace monitoring \
            --create-namespace \
            -f helm/infrastructure/monitoring/prometheus-values.yaml \
            --set grafana.adminPassword=${{ secrets.GRAFANA_ADMIN_PASSWORD }} \
            --wait --timeout 10m

      - name: Install Fluent Bit
        run: |
          FLUENT_BIT_ROLE=$(cd terraform/environments/dev && terraform output -raw fluent_bit_role_arn)
          helm upgrade --install fluent-bit fluent/fluent-bit \
            --namespace logging \
            --create-namespace \
            -f helm/infrastructure/logging/fluent-bit-values.yaml \
            --set-string "serviceAccount.annotations.eks\.amazonaws\.com/role-arn=$FLUENT_BIT_ROLE" \
            --wait --timeout 5m

      - name: Deploy ecommerce app
        run: |
          kubectl create namespace ${{ env.NAMESPACE }} --dry-run=client -o yaml | kubectl apply -f -
          kubectl label namespace ${{ env.NAMESPACE }} app.kubernetes.io/managed-by=Helm --overwrite
          kubectl annotate namespace ${{ env.NAMESPACE }} meta.helm.sh/release-name=ecommerce --overwrite
          kubectl annotate namespace ${{ env.NAMESPACE }} meta.helm.sh/release-namespace=${{ env.NAMESPACE }} --overwrite

          ECR_BASE="${{ env.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com"

          helm upgrade --install ecommerce ./helm/ecommerce \
            --namespace ${{ env.NAMESPACE }} \
            -f helm/ecommerce/values.yaml \
            -f helm/ecommerce/values-dev.yaml \
            --set frontend.image.repository="$ECR_BASE/ecommerce-frontend" \
            --set frontend.image.tag=${{ env.IMAGE_TAG }} \
            --set backend.image.repository="$ECR_BASE/ecommerce-backend" \
            --set backend.image.tag=${{ env.IMAGE_TAG }} \
            --set serviceAccount.roleArn=${{ env.BACKEND_SA_ROLE_ARN }} \
            --set global.awsAccountId=${{ env.AWS_ACCOUNT_ID }} \
            --atomic --wait --timeout 10m

      - name: Verify Kubernetes Deployments
        run: |
          kubectl rollout status deployment/frontend -n ${{ env.NAMESPACE }} --timeout=5m
          kubectl rollout status deployment/backend  -n ${{ env.NAMESPACE }} --timeout=5m

      - name: Automated Smoke Test / Health Check
        run: |
          # Fetch ALB DNS Address
          echo "Waiting for Ingress Load Balancer DNS..."
          ALB_HOST=""
          for i in {1..20}; do
            ALB_HOST=$(kubectl get ingress -n ${{ env.NAMESPACE }} -o jsonpath='{.items[0].status.loadBalancer.ingress[0].hostname}')
            if [ -n "$ALB_HOST" ]; then
              break
            fi
            echo "Sleeping 15s waiting for DNS assignment..."
            sleep 15
          done
          
          if [ -z "$ALB_HOST" ]; then
            echo "❌ Failed to retrieve ALB DNS hostname after 5 minutes."
            exit 1
          fi
          
          echo "✅ ALB DNS: $ALB_HOST"
          echo "Hitting app /health endpoint..."
          
          # Hit /health endpoint inside EKS cluster or via public ALB (it may take 1-2 mins to provision)
          # We fall back to curl internal ClusterIP service if external ALB is still provisioning in AWS
          curl -f "http://$ALB_HOST/health" || {
            echo "⚠️ Public ALB DNS might still be provisioning. Trying internal ClusterIP service..."
            kubectl run smoke-test-pod --image=curlimages/curl --rm -i --restart=Never -n ${{ env.NAMESPACE }} -- \
              curl -fsS http://backend-service:8000/health
          }
          
          echo "🎉 Smoke test passed! Test branch deployed successfully."
