<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ShopEKS — Modern Store</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet">
</head>
<body>

  <!-- ── HEADER ─────────────────────────────────────────── -->
  <header class="site-header">
    <div class="header-inner">
      <a href="#" class="logo">Shop<span>EKS</span></a>
      <nav class="nav-links">
        <a href="#products">Products</a>
        <a href="#about">About</a>
      </nav>
      <button class="cart-btn" id="cartToggle" aria-label="Open cart">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/>
          <line x1="3" y1="6" x2="21" y2="6"/>
          <path d="M16 10a4 4 0 01-8 0"/>
        </svg>
        <span class="cart-count" id="cartCount">0</span>
      </button>
    </div>
  </header>

  <!-- ── HERO ───────────────────────────────────────────── -->
  <section class="hero">
    <div class="hero-inner">
      <p class="hero-eyebrow">New arrivals, curated daily</p>
      <h1 class="hero-title">The store<br/><em>that ships.</em></h1>
      <p class="hero-sub">Minimal products, maximal quality. Built on AWS EKS.</p>
      <a href="#products" class="hero-cta">Browse Products</a>
    </div>
    <div class="hero-deco" aria-hidden="true">
      <div class="deco-ring deco-ring--1"></div>
      <div class="deco-ring deco-ring--2"></div>
      <div class="deco-ring deco-ring--3"></div>
    </div>
  </section>

  <!-- ── TOAST ──────────────────────────────────────────── -->
  <div class="toast" id="toast" aria-live="polite"></div>

  <!-- ── PRODUCTS ───────────────────────────────────────── -->
  <section class="products-section" id="products">
    <div class="section-header">
      <h2 class="section-title">All Products</h2>
      <div class="filter-row">
        <input class="search-input" id="searchInput" type="search" placeholder="Search products…" aria-label="Search products"/>
        <select class="sort-select" id="sortSelect" aria-label="Sort products">
          <option value="default">Sort: Default</option>
          <option value="price-asc">Price: Low → High</option>
          <option value="price-desc">Price: High → Low</option>
          <option value="name-asc">Name: A → Z</option>
        </select>
      </div>
    </div>

    <!-- Loading skeleton -->
    <div class="product-grid" id="productGrid">
      <div class="skeleton-card"></div>
      <div class="skeleton-card"></div>
      <div class="skeleton-card"></div>
      <div class="skeleton-card"></div>
      <div class="skeleton-card"></div>
      <div class="skeleton-card"></div>
    </div>

    <div class="empty-state hidden" id="emptyState">
      <div class="empty-icon">⌕</div>
      <p>No products found</p>
    </div>
  </section>

  <!-- ── CART DRAWER ────────────────────────────────────── -->
  <div class="cart-overlay" id="cartOverlay"></div>
  <aside class="cart-drawer" id="cartDrawer" aria-label="Shopping cart">
    <div class="cart-header">
      <h2>Your Cart</h2>
      <button class="cart-close" id="cartClose" aria-label="Close cart">✕</button>
    </div>

    <div class="cart-items" id="cartItems">
      <div class="cart-empty" id="cartEmpty">
        <div class="cart-empty-icon">🛍</div>
        <p>Your cart is empty</p>
        <button class="btn-outline" onclick="closeCart()">Continue Shopping</button>
      </div>
    </div>

    <div class="cart-footer" id="cartFooter" style="display:none">
      <div class="cart-summary">
        <div class="summary-row">
          <span>Subtotal</span>
          <span id="cartSubtotal">$0.00</span>
        </div>
        <div class="summary-row summary-row--total">
          <span>Total</span>
          <span id="cartTotal">$0.00</span>
        </div>
      </div>
      <button class="btn-primary btn-full" id="checkoutBtn">Checkout</button>
      <button class="btn-ghost btn-full" id="clearCartBtn">Clear Cart</button>
    </div>
  </aside>

  <!-- ── PRODUCT MODAL ──────────────────────────────────── -->
  <div class="modal-overlay hidden" id="modalOverlay">
    <div class="product-modal" id="productModal" role="dialog" aria-modal="true">
      <button class="modal-close" id="modalClose" aria-label="Close">✕</button>
      <div class="modal-body" id="modalBody"></div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
