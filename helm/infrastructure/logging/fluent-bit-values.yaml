# helm/infrastructure/logging/fluent-bit-values.yaml
# Overrides for: fluent/fluent-bit → ships logs to AWS CloudWatch
#
# Install command:
#   helm repo add fluent https://fluent.github.io/helm-charts
#   helm upgrade --install fluent-bit fluent/fluent-bit \
#     -n logging --create-namespace \
#     -f helm/infrastructure/logging/fluent-bit-values.yaml

# Fluent Bit runs as a DaemonSet — one pod per node
kind: DaemonSet

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 100m
    memory: 128Mi

# ── Service Account (IRSA for CloudWatch access) ──────────────────────────────
serviceAccount:
  create: true
  name: fluent-bit
  annotations:
    eks.amazonaws.com/role-arn: ""

# ── Config ────────────────────────────────────────────────────────────────────
config:
  service: |
    [SERVICE]
        Flush         5
        Log_Level     info
        Daemon        off
        Parsers_File  parsers.conf
        HTTP_Server   On
        HTTP_Listen   0.0.0.0
        HTTP_Port     2020
        Health_Check  On

  inputs: |
    [INPUT]
        Name              tail
        Tag               kube.*
        Path              /var/log/containers/*.log
        Parser            docker
        DB                /var/log/flb_kube.db
        Mem_Buf_Limit     5MB
        Skip_Long_Lines   On
        Refresh_Interval  10

  filters: |
    [FILTER]
        Name                kubernetes
        Match               kube.*
        Kube_URL            https://kubernetes.default.svc:443
        Kube_CA_File        /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
        Kube_Token_File     /var/run/secrets/kubernetes.io/serviceaccount/token
        Merge_Log           On
        Keep_Log            Off
        K8S-Logging.Parser  On
        K8S-Logging.Exclude On

  outputs: |
    [OUTPUT]
        Name                cloudwatch_logs
        Match               kube.*
        region              us-west-2
        log_group_name      /eks/ecommerce-platform
        log_stream_prefix   ${HOSTNAME}-
        auto_create_group   On
        retry_limit         2