# helm/infrastructure/monitoring/prometheus-values.yaml
# Overrides for: kube-prometheus-stack
#
# Install command:
#   helm repo add prometheus-community https://prometheus-community.github.io/helm-charts
#   helm upgrade --install prometheus prometheus-community/kube-prometheus-stack \
#     -n monitoring --create-namespace \
#     -f helm/infrastructure/monitoring/prometheus-values.yaml

# ── Prometheus ────────────────────────────────────────────────────────────────
prometheus:
  prometheusSpec:
    retention: 7d                       # keep 7 days of metrics
    resources:
      requests:
        cpu: 200m
        memory: 512Mi
      limits:
        cpu: 500m
        memory: 1Gi
    storageSpec:
      volumeClaimTemplate:
        spec:
          accessModes: [ReadWriteOnce]
          resources:
            requests:
              storage: 20Gi

# ── Alertmanager ──────────────────────────────────────────────────────────────
alertmanager:
  alertmanagerSpec:
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 100m
        memory: 128Mi

# ── Node Exporter ─────────────────────────────────────────────────────────────
nodeExporter:
  enabled: true

# ── Kube State Metrics ────────────────────────────────────────────────────────
kubeStateMetrics:
  enabled: true

# ── Grafana — disabled here, configured separately ────────────────────────────
grafana:
  enabled: false                        # deployed via grafana-values.yaml
  adminPassword: ""