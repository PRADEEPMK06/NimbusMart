# helm/infrastructure/aws-load-balancer-controller/values.yaml
# Overrides for: helm install aws-load-balancer-controller
#   eks/aws-load-balancer-controller
#
# Install command:
#   helm repo add eks https://aws.github.io/eks-charts
#   helm upgrade --install aws-load-balancer-controller eks/aws-load-balancer-controller \
#     -n kube-system \
#     -f helm/infrastructure/aws-load-balancer-controller/values.yaml \
#     --set clusterName=<CLUSTER_NAME> \
#     --set serviceAccount.annotations."eks\.amazonaws\.com/role-arn"=<ALB_CONTROLLER_ROLE_ARN>

clusterName: ""                         # ← injected by CI/CD from terraform output

replicaCount: 2                         # HA — one per AZ

serviceAccount:
  create: true
  name: aws-load-balancer-controller
  annotations:
    eks.amazonaws.com/role-arn: ""      # ← injected by CI/CD from terraform output

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 200m
    memory: 256Mi

# Pod disruption budget — always keep 1 controller running
podDisruptionBudget:
  maxUnavailable: 1

# Enable shield, WAF integrations (set true if you use AWS WAF)
enableShield: false
enableWaf: false
enableWafv2: false

# Log level: info or debug
logLevel: info