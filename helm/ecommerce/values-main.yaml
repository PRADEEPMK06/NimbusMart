# Override values for main environment

namespace:
  name: ecommerce

serviceAccount:
  name: backend-sa
  # IAM Role ARN will be injected by Terraform
  iamRoleArn: ""

frontend:
  replicaCount: 2
  image:
    repository: ""
    tag: latest
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 80
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi
  autoscaling:
    minReplicas: 2
    maxReplicas: 10
    targetCPUUtilizationPercentage: 70

backend:
  replicaCount: 2
  image:
    repository: ""
    tag: latest
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 8000
  env:
    dbSecretName: ecommerce-db-credentials
    sqlEcho: "false"
    allowedOrigins: "*"
    appVersion: "1.0.0"
    dbUsername: postgres
    dbPassword: ""
    dbHost: ""
    dbPort: "5432"
    dbName: ecommerce
  resources:
    requests:
      cpu: 200m
      memory: 256Mi
    limits:
      cpu: 1000m
      memory: 512Mi
  autoscaling:
    minReplicas: 2
    maxReplicas: 10
    targetCPUUtilizationPercentage: 70

ingress:
  host: ""
  scheme: internet-facing
  targetType: ip
  sslRedirect: "true"
  certificateArn: ""
  subnets: ""
  securityGroups: ""
  tags: {}

global:
  awsRegion: us-east-1

podDisruptionBudget:
  minAvailable: 1

postgresql:
  enabled: false

redis:
  enabled: false